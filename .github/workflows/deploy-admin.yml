name: Deploy KAZI Admin to AWS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-admin:
    name: Build and Deploy Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build admin bundle
        run: yarn workspace @kazi/admin build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync admin bundle to S3
        run: aws s3 sync apps/admin/dist s3://${{ secrets.AWS_ADMIN_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_ADMIN_CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'